name: Weekly Campaign Report (DISABLED — moved to email-outreach-machine repo)

on:
  workflow_dispatch:
  # schedule removed — this workflow is now in smagnacca/email-outreach-machine

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate and send weekly report
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node weekly-report.js
